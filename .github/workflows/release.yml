name: Arcadible Release

on:
  workflow_call:

permissions:
  contents: write

env:
  ARC_BIN: ${{ github.workspace }}/node_modules/.bin
  ARC_TAG: ${{ github.ref_name }}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install CLI
        run: npm install -g @arcadible/cli@^0.1.3
      - name: Check Workspace
        run: arc check -C "$GITHUB_WORKSPACE" -q
      - name: Install CICD
        run: npm install @arcadible/cicd-github-release@^0.1.0 --no-save
      - name: Check Tag
        run: $ARC_BIN/arctk-assert-tag "$ARC_TAG"
